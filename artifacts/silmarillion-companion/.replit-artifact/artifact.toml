kind = "web"
previewPath = "/"
title = "Silmarillion Companion"
version = "1.0.0"
id = "artifacts/silmarillion-companion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18403

[services.development]
run = "pnpm --filter @workspace/silmarillion-companion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/silmarillion-companion", "run", "build" ]
publicDir = "artifacts/silmarillion-companion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18403"
BASE_PATH = "/"
